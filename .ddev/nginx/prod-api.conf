# Dev-only: route the Symfony API app (symlinked at <docroot>/api -> packages/api/public)
# through its front controller so sub-routes such as /api/mcp and /api/source resolve
# under ddev, matching production. The existing `location ~ \.php$` block handles the
# FastCGI pass; REQUEST_URI is preserved across the internal redirect, so Symfony derives
# the correct base path (/api) and path info.
location /api {
    try_files $uri $uri/ /api/index.php$is_args$args;
}
