# Route the Symfony API app (symlinked at <docroot>/api -> packages/api/public)
# through its front controller so `/api/` and sub-routes such as /api/mcp and
# /api/source resolve, matching production. The existing `location ~ \.php$` block
# handles the FastCGI pass; REQUEST_URI is preserved across the internal redirect, so
# Symfony derives the correct base path (/api) and path info.
#
# No `$uri/` term on purpose: `dist/api` is a real (symlinked) directory with no index
# file, so `$uri/` would make nginx serve a directory listing for `POST /api/` (the
# playground render endpoint) and return 403 before reaching the front controller.
location /api {
    try_files $uri /api/index.php$is_args$args;
}
